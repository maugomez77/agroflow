services:
  # Backend — FastAPI
  - type: web
    name: agroflow-api
    runtime: python
    buildCommand: pip install .
    startCommand: agroflow demo && uvicorn agroflow.api:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: PYTHON_VERSION
        value: "3.11"

  # Frontend — Vite static site
  - type: web
    name: agroflow-frontend
    runtime: static
    buildCommand: cd frontend && npm install && VITE_API_URL=https://agroflow-api.onrender.com npm run build
    staticPublishPath: frontend/dist
    headers:
      - path: /*
        name: Cache-Control
        value: public, max-age=0, must-revalidate
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
