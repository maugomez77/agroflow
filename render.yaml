services:
  # Backend — FastAPI
  - type: web
    name: agroflow-api
    runtime: python
    buildCommand: pip install -e .
    startCommand: uvicorn agroflow.api:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: PYTHON_VERSION
        value: "3.11"

  # Frontend — Vite static site
  - type: web
    name: agroflow-frontend
    buildCommand: cd frontend && npm install && npm run build
    staticPublishPath: frontend/dist
    headers:
      - path: /*
        name: Cache-Control
        value: public, max-age=0, must-revalidate
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_URL
        fromService:
          name: agroflow-api
          type: web
          property: host
